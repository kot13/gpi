name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  test-unit:
    name: test-unit
    runs-on: ubuntu-22.04
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  test-integration:
    name: test-integration
    runs-on: ubuntu-22.04
    needs: test-unit
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:integration

  build:
    name: build
    runs-on: ubuntu-22.04
    needs: test-integration
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gpi
          POSTGRES_PASSWORD: gpi
          POSTGRES_DB: gpi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gpi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URI: postgresql://gpi:gpi@localhost:5432/gpi
      PAYLOAD_SECRET: ${{ secrets.CI_PAYLOAD_SECRET }}
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
