version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: gpi
      POSTGRES_PASSWORD: gpi
      POSTGRES_DB: gpi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gpi -d gpi']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
